name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild build \
            -project CryptoLegacy.xcodeproj \
            -scheme CryptoLegacy \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build"

          mkdir -p Payload
          cp -R build/Cryptomator.app Payload/
          zip -r CryptoLegacy.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: CryptoLegacy.ipa
          path: CryptoLegacy.ipa
