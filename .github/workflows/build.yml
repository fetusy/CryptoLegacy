name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build IPA
        run: |
          xcodebuild archive \
            -project CryptoLegacy.xcodeproj \
            -scheme CryptoLegacy \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/CryptoLegacy.xcarchive \
            -allowProvisioningUpdates \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p Payload
          cp -R ./build/CryptoLegacy.xcarchive/Products/Applications/CryptoLegacy.app Payload/
          zip -r CryptoLegacy.ipa Payload
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: CryptoLegacy.ipa
          path: CryptoLegacy.ipa
